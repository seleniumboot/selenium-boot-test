execution:
  mode: local           # local | remote
  baseUrl: https://panjatan.netlify.app
  parallel: none     # none | methods | classes
  threadCount: 4
  maxActiveSessions: 4

browser:
  name: chrome          # chrome | firefox
  headless: false
  lifecycle: per-suite  # per-test (default) | per-suite — keeps browser open across tests
  arguments:
    - --start-maximized
    - --disable-notifications

retry:
  enabled: true
  maxAttempts: 2

timeouts:
  explicit: 10          # seconds — used by WaitEngine
  pageLoad: 30          # seconds
