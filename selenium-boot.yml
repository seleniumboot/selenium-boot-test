execution:
  mode: local           # local | remote
  baseUrl: https://panjatan.netlify.app
  parallel: methods        # none | methods | classes
  threadCount: 4
  maxActiveSessions: 4

browser:
  name: firefox          # chrome | firefox
  headless: false
  lifecycle: per-test   # per-test (default) | per-suite
  captureConsoleErrors: true   # collect JS errors — used by ConsoleErrorDemoTest
  failOnConsoleErrors: false   # set true to fail test on any JS error
  arguments:
    - --start-maximized
    - --disable-notifications

retry:
  enabled: true
  maxAttempts: 0

timeouts:
  explicit: 10          # seconds — used by WaitEngine
  pageLoad: 30          # seconds
