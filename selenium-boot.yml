execution:
  mode: remote           # local | remote  →  switch to "remote" for Sauce Labs
  baseUrl: https://panjatan.netlify.app
  parallel: methods        # none | methods | classes
  threadCount: 4
  maxActiveSessions: 4
  # Sauce Labs grid URL — uncomment when running on Sauce Labs
  # gridUrl: https://ondemand.eu-central-1.saucelabs.com:443/wd/hub

browser:
  name: chrome          # chrome | firefox
  headless: false
  lifecycle: per-test   # per-test (default) | per-suite
  captureConsoleErrors: true   # collect JS errors — used by ConsoleErrorDemoTest
  failOnConsoleErrors: false   # set true to fail test on any JS error
  arguments:
    - --start-maximized
    - --disable-notifications
  # Sauce Labs capabilities — uncomment the block below when running on Sauce Labs
  capabilities:
    platformName: "Windows 11"
    browserVersion: "latest"
    "sauce:options":
      username: "oauth-sddmhossain786-9d339"
      accessKey: "be291c86-494c-4e98-be53-3c90093a98c1"
      build: "selenium-boot-run-001"
      name: "Selenium Boot Tests"

retry:
  enabled: true
  maxAttempts: 0

timeouts:
  explicit: 10          # seconds — used by WaitEngine
  pageLoad: 30          # seconds

recording:
  enabled: true
  fps: 2
  maxDurationSeconds: 30

tracing:
  enabled: true           # generate trace HTML for failed tests
  captureOnPass: false    # set true to also generate traces for passing tests

locators:
  selfHealing: true       # retry with fallback strategies when a locator times out

reporting:
  allureEnabled: false    # set true to generate target/allure-results/ for Allure CLI

notifications:
  slack:
    webhookUrl:           # https://hooks.slack.com/services/xxx/yyy/zzz
    notifyOnFailureOnly: false
  teams:
    webhookUrl:           # https://xxx.webhook.office.com/webhookb2/...
    notifyOnFailureOnly: false
